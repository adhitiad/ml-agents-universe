version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: deployment/dockerfiles/api_gateway.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    networks:
      - universe-net
    depends_on:
      - agent-nlp
      - agent-finance
      - agent-economy
      - agent-education
      - agent-entertainment
      - agent-mathematics
      - agent-science
      - agent-healthcare
      - agent-legal
      - agent-cybersecurity
      - agent-creative
      - agent-devops
      - agent-data_engineering
      - agent-osint
      - agent-game_ai
      - agent-productivity

  agent-nlp:
    build:
      context: .
      dockerfile: deployment/dockerfiles/agent.Dockerfile
      args:
        DOMAIN_NAME: nlp
    volumes:
      - shared-data:/app/data
    networks:
      - universe-net

  agent-finance:
    build:
      context: .
      dockerfile: deployment/dockerfiles/agent.Dockerfile
      args:
        DOMAIN_NAME: finance
    volumes:
      - shared-data:/app/data
    networks:
      - universe-net

