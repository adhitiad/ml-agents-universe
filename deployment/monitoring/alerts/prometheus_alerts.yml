groups:
- name: ml-agents-universe-alerts
  rules:
  
  - alert: HighErrorRateAlert
    expr: rate(error_rate_total[5m]) > 0.05
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "High error rate detected in domain {{ $labels.domain }}"
      description: "Error rate is > 5% for the last 5 minutes."
      
  - alert: HighLatencyAlert
    expr: histogram_quantile(0.95, rate(inference_latency_seconds_bucket[3m])) > 2.0
    for: 3m
    labels:
      severity: warning
    annotations:
      summary: "High latency detected in domain {{ $labels.domain }}"
      description: "P95 latency exceeded 2s."

  - alert: DataQualityAlert
    expr: data_quality_score < 0.7
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "Low Data Quality in {{ $labels.domain }}"
      
  - alert: ResourceExhaustionAlert
    expr: system_memory_usage_bytes > 1000000000
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "Memory usage > 1GB limit"
