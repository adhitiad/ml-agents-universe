name: Deployment Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Base Image
        run: |
          docker build -t ghcr.io/ml-agents/base:latest -t ghcr.io/ml-agents/base:${{ github.ref_name }} -f deployment/dockerfiles/base.Dockerfile .
          docker push ghcr.io/ml-agents/base:${{ github.ref_name }}

      - name: Build API Gateway
        run: |
          docker build -t ghcr.io/ml-agents/api-gateway:${{ github.ref_name }} -f deployment/dockerfiles/api_gateway.Dockerfile .
          docker push ghcr.io/ml-agents/api-gateway:${{ github.ref_name }}

      - name: Build Agents (Dynamic)
        run: |
          for domain in nlp finance economy education entertainment mathematics science; do
            docker build --build-arg DOMAIN_NAME=$domain -t ghcr.io/ml-agents/agent-$domain:${{ github.ref_name }} -f deployment/dockerfiles/agent.Dockerfile .
            docker push ghcr.io/ml-agents/agent-$domain:${{ github.ref_name }}
          done

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Deploy to Staging Cluster
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          helm upgrade --install ml-agents-universe-staging ./deployment/helm/ml-agents-universe \
            --set global.repository=ghcr.io/ml-agents \
            --set gateway.tag=${{ github.ref_name }} \
            --set agents.tag=${{ github.ref_name }} \
            --namespace staging --create-namespace
